<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 12</title>
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      font-family: sans-serif;
    }

    label {
      cursor: pointer;
    }

    datalist {
      margin-left: 55px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      writing-mode: vertical-lr;
      width: 135px;
    }
  </style>
</head>

<body>
  <form action="#" method="get" target="_blank" autocomplete="off">
    <p>Meu formulário</p>

    <p>
      <label for="nome">Nome:</label>
      <input type="text" name="nome" id="nome" placeholder="Seu nome" required>
    </p>

    <p>
      <label for="dev">Sou Dev</label>
      <input type="checkbox" name="dev" id="dev" value="sim" checked><br>
      <label for="dev">Sou Sec</label>
      <input type="checkbox" name="dev" id="dev" value="sim"><br>
      <label for="dev">Sou Infra</label>
      <input type="checkbox" name="dev" id="dev" value="sim">
    </p>

    <p>
      Genero:<br>
      <label for="feminino">Feminino</label>
      <input type="radio" name="genero" id="feminino"><br>
      <label for="masculino">Masculino</label>
      <input type="radio" name="genero" id="masculino"><br>
      <label for="outros">Outros</label>
      <input type="radio" name="genero" id="outros">
    </p>

    <p>
      <label for="data">Data:</label>
      <input type="date" name="data" id="data" value="2020-04-20">
    </p>

    <p>
      <label for="data-local">Data Local:</label>
      <input type="datetime-local" name="data-local" id="data-local" value="2020-04-20T20:00">
    </p>

    <p>
      <label for="tempo">Tempo:</label>
      <input type="time" name="tempo" id="tempo" value="20:00:03">
    </p>

    <p>
      <label for="cor">Cor:</label>
      <input type="color" name="cor" id="cor" value="#fa0000">
    </p>

    <p>
      <label for="email">Email:</label>
      <input type="email" name="email" id="email" placeholder="Seu email">
    </p>

    <p>
      <label for="arquivo">Arquivo:</label>
      <input type="file" name="arquivo" id="arquivo" accept=".png,.svg,images/*">
    </p>

    <p>
      <label for="numero">Número:</label>
      <input type="number" name="numero" id="numero" accept=".png,.svg,images/*" placeholder="Digite um número" min="10"
        max="50" step="0.1" value="10.3">
    </p>

    <p>
      <label for="senha">Senha:</label>
      <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
    </p>

    <p>
      <label for="range">Range:</label>
      <input type="range" name="range" id="range" list="marcadores">
      <datalist id="marcadores">
        <option value="0" label="0"></option>
        <option value="25" label="25"></option>
        <option value="50" label="50"></option>
        <option value="75" label="75"></option>
        <option value="100" label="100"></option>
      </datalist>
    </p>

    <p>
      <label for="url">URL:</label>
      <input type="url" name="url" id="url">
    </p>

    <p>
      <label for="busca">Buscar:</label>
      <input type="search" name="busca" id="busca">
    </p>

    <p>
      <label for="selecione">Selecione alguma opção</label>
      <select name="selecione" id="selecione">
        <optgroup label="Primeiro grupo">
          <option value="qualquer coisa">Qualquer coisa</option>
          <option value="valor" selected>Valor</option>
          <option value="qualquer coisa2">Qualquer coisa2</option>
          <option value="valor3" selected>Valo3r</option>
        </optgroup>
        <optgroup label="Segundo grupo">
          <option value="qualquer coisa4">Qualquer coisa4</option>
          <option value="valor4" selected>Valor4</option>
          <option value="qualquer coisa25">Qualquer coisa26</option>
          <option value="valor37" selected>Valo3r3</option>
        </optgroup>

      </select>
    </p>

    <p>
      <label for="text-area">Text-area:</label>
      <textarea name="text-area" id="text-area" rows="8" cols="50"></textarea>
    </p>

    <p>
      <button type="submit">Enviar</button>
      <button type="reset">Reset</button>
    </p>
  </form>

  <script src="index.js"></script>
</body>

</html>
