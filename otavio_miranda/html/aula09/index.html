<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 09</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .section-one {
      width: 200px;
      height: 150px;
      color: white;
      background-color: deeppink;
      background-image: url(https://upload.wikimedia.org/wikipedia/commons/c/c8/Altja_j%C3%B5gi_Lahemaal.jpg);
      background-size: cover;
      background-position: center center;
      border-width: 10px;
      border-style: solid;
      border-bottom-color: bisque;
      border-top-color: black;
      border-left-color: brown;
      border-right-color: blue;
      padding: 15px;
      margin: 30px;
    }

    .section-two {
      background-color: cyan;
      width: 200px;
      height: 50px;
      border: 5px solid black;
      padding: 20px;
      margin: 20px;
    }
  </style>
</head>

<body>
  <script src="index.js"></script>
  <section class="section-one">Lorem ipsum dolor sit amet consectetur adipisicing elit. Natus
    illum dignissimos?</section>
  <section class="section-two">2</section>
</body>

</html>
